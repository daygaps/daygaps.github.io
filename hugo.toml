# Hugo configuration for the DayGaps marketing site.
#
# Rename strategy: the public product name lives ONLY in `params.brand`.
# If the product is renamed, change `params.brand.*` here and nothing else.
# Templates and content always read the name via `.Site.Params.brand.*`.

baseURL = "https://daygaps.com/"   # user-site URL (repo: daygaps/daygaps.github.io). Update if you point a custom domain.
languageCode     = "en-us"
defaultContentLanguage = "en"

# Title is set from the brand param at render time. Keep this as a fallback
# so feed generators / sitemap don't render empty if a template forgets it.
title            = "DayGaps"

# Use the bare-minimum theme: we wrote layouts ourselves under layouts/.
# No external theme is imported.

enableRobotsTXT  = true
enableEmoji      = false
enableGitInfo    = false

# Hugo Pipes for the single CSS file (asset bundling + minification).
[minify]
  minifyOutput = true

[markup]
  [markup.goldmark.renderer]
    unsafe = true  # allow inline SVG / HTML in markdown content where we need it
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3
    ordered    = false

# Centralized brand identity. Change here, change everywhere.
[params.brand]
  # No space in the product name. The two halves render as one closed
  # compound word with the two-tone color treatment (Day muted, Gaps full)
  # wherever the brand appears in body text. See `layouts/partials/brand-inline.html`.
  name        = "DayGaps"             # full product name, no space
  nameLeft    = "Day"                 # left half for split-logo / two-tone renders
  nameRight   = "Gaps"                # right half for split-logo / two-tone renders
  # Public-facing tagline. Plain text. The user kept the layered
  # strike-shit-write-stuff joke for the logo art only. On the website
  # this reads straight. Don't reintroduce the <s> here.
  tagline     = "when real stuff gets done"
  description = "A task app for Mac and iPhone, built around the gap. The precious window of time between meetings where real work actually happens."

# Site-wide knobs the templates read.
[params]
  author       = "DayGaps"           # publisher name for RSS / sitemap. Visible footer copyright renders DayGaps two-tone via the brand partial regardless.
  twitter      = ""                   # optional @handle, omitted from <head> when empty
  releaseStage = "private beta"       # shown on the landing CTA and beta page

  # Direct-download CTA targets. The site is built around a download/TestFlight
  # link rather than an email waitlist. Update these when artifacts exist.
  [params.cta]
    primaryLabel  = "Join the private beta"
    primaryHref   = "/beta/"
    secondaryLabel = "Read the philosophy"
    secondaryHref  = "/philosophy/"
    # At App Store launch, flip the primary to the store listing:
    #   primaryLabel = "Get it on the App Store"
    #   primaryHref  = "https://apps.apple.com/app/daygaps/idXXXXXXXXX"
    # and update releaseStage above. The beta page becomes the download page
    # (same /beta/ URL, retitled; see content/beta.md).

  # macOS direct-download build. The /beta/ page reads these through the
  # `mac-download` shortcode, so version, size, OS floor, and filename live in
  # ONE place. Update on every Mac build you post to static/downloads/.
  [params.macApp]
    version = "1.0.1"               # CFBundleShortVersionString of the posted build
    build   = "2"                   # CFBundleVersion
    minOS   = "26.4"                # LSMinimumSystemVersion of the build you post. Set to the LOWEST macOS your code actually builds against, not the Xcode/SDK default. See the note in content/beta.md.
    size    = ""                    # human size of the .zip once made, e.g. "8 MB". Empty hides it.
    file    = "DayGaps-1.0.1.zip"   # filename in static/downloads/. ditto-zip the signed .app to exactly this name.

  # Email capture shown at the Mac download. Doubles as the launch waitlist and
  # the iOS TestFlight invite list. Paste a form/newsletter POST endpoint to go
  # live; while empty, the signup falls back to a mailto so nothing is broken.
  # Recommended: Buttondown (privacy-first, free tier, also your announce list).
  [params.betaSignup]
    action = ""                     # e.g. https://buttondown.com/api/emails/embed-subscribe/USERNAME  or  https://formspree.io/f/XXXXXXXX
    email  = "daygaps@gmail.com"    # mailto fallback target used when action is empty

# Top-of-page navigation. Order matters; templates iterate in declared order.
# Reading order mirrors a visitor's deepening interest: get started, learn
# the model, see it in a day, read the reasoning, then platform + AI depth.
# Changelog and the legal pages live in the footer menu below.
[[menu.main]]
  name   = "Start"
  url    = "/start/"
  weight = 5

[[menu.main]]
  name   = "Concepts"
  url    = "/concepts/"
  weight = 8

[[menu.main]]
  name   = "Patterns"
  url    = "/patterns/"
  weight = 10

[[menu.main]]
  name   = "Philosophy"
  url    = "/philosophy/"
  weight = 20

[[menu.main]]
  name   = "iPhone"
  url    = "/ios/"
  weight = 25

[[menu.main]]
  name   = "AI"
  url    = "/ai/"
  weight = 28

[[menu.main]]
  name   = "Get the app"
  url    = "/beta/"
  weight = 30

[[menu.main]]
  name   = "Pricing"
  url    = "/pricing/"
  weight = 31

[[menu.main]]
  name   = "FAQ"
  url    = "/faq/"
  weight = 35

# Footer-only navigation: reference pages a visitor seeks out rather than
# browses to. Rendered by layouts/partials/footer.html after the main menu.
[[menu.footer]]
  name   = "Changelog"
  url    = "/changelog/"
  weight = 10

[[menu.footer]]
  name   = "Privacy"
  url    = "/privacy/"
  weight = 20

[[menu.footer]]
  name   = "Terms"
  url    = "/terms/"
  weight = 30

[[menu.footer]]
  name   = "Support"
  url    = "/support/"
  weight = 40

# Don't generate per-section RSS pages we won't use. Home + changelog only.
[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML"]
  page    = ["HTML"]
