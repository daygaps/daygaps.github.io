{{- $brand := site.Params.brand -}}
<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a class="site-mark" href="{{ "/" | relURL }}" aria-label="{{ $brand.name }}, home">
      {{ partial "pill-mark.html" . }}
    </a>
    <nav class="site-nav" aria-label="Primary">
      {{- range site.Menus.main }}
        <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
      {{- end }}
    </nav>
  </div>
</header>
