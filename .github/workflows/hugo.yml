# Build and deploy the Day Gaps marketing site to GitHub Pages.
#
# Assumes this `daygaps-site` directory IS the repo root once published. If
# you decide to keep it as a subdirectory of a larger repo, set `working-directory`
# on the build step and adjust the upload path accordingly.
#
# Hugo version is pinned to keep builds reproducible. Bump as needed.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Single in-flight deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.140.0
    steps:
      - name: Install Hugo extended
        run: |
          curl -sSL -o /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the first run if it isn't already configured.
          # Without this, the action errors out with "Get Pages site failed"
          # when Pages is enabled AFTER a workflow has already been pushed.
          enablement: true

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
